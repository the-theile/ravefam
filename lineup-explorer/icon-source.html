<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lineup Explorer Icon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vmin; height: 100vmin; overflow: hidden; }
  body {
    position: relative;
    background: #07050f;
  }
  .ring {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 84vmin; height: 84vmin; border-radius: 50%;
    border: 1.6vmin solid rgba(57,255,20,0.16);
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(60% 55% at 50% 42%, rgba(177,92,255,0.30), transparent 65%);
  }
  .bars {
    position: absolute; left: 50%; bottom: 15vmin; transform: translateX(-50%);
    display: flex; align-items: flex-end; gap: 4.4vmin;
  }
  .bar { width: 10.4vmin; border-radius: 5.2vmin 5.2vmin 2vmin 2vmin; }
  .bar.b1 { height: 27vmin; background: #ff2d95; box-shadow: 0 0 7vmin rgba(255,45,149,0.55); }
  .bar.b2 { height: 45vmin; background: #b15cff; box-shadow: 0 0 7vmin rgba(177,92,255,0.55); }
  .bar.b3 { height: 63vmin; background: #2ee6c8; box-shadow: 0 0 7vmin rgba(46,230,200,0.55); }
  .bar.b4 { height: 40vmin; background: #39ff14; box-shadow: 0 0 7vmin rgba(57,255,20,0.5); }
  .bar.b5 { height: 22vmin; background: #ff2d95; box-shadow: 0 0 7vmin rgba(255,45,149,0.5); }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="ring"></div>
  <div class="bars">
    <div class="bar b1"></div>
    <div class="bar b2"></div>
    <div class="bar b3"></div>
    <div class="bar b4"></div>
    <div class="bar b5"></div>
  </div>
</body>
</html>
