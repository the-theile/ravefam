<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Lineup Explorer OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@400;500;700&family=Urbanist:wght@800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: #07050f;
    color: #f3eefb;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(70% 60% at 8% 0%, rgba(255,45,149,0.30), transparent 55%),
      radial-gradient(60% 55% at 100% 100%, rgba(46,230,200,0.24), transparent 55%),
      radial-gradient(50% 50% at 60% 40%, rgba(177,92,255,0.20), transparent 60%),
      #07050f;
  }

  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(160,140,220,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(160,140,220,0.07) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(90% 80% at 20% 10%, #000 30%, transparent 78%);
  }

  .content { position: relative; z-index: 2; padding: 52px 64px; }

  .brand {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 9px 18px 9px 12px;
    border: 1px solid rgba(160,140,220,0.28);
    border-radius: 999px;
    background: rgba(12,8,30,0.7);
  }
  .brand .mark {
    width: 22px; height: 22px; border-radius: 50%;
    background: conic-gradient(from 0deg, #ff2d95, #b15cff, #2ee6c8, #39ff14, #ff2d95);
    display: grid; place-items: center;
  }
  .brand .mark::after {
    content: ""; width: 8px; height: 8px; border-radius: 50%; background: #07050f;
  }
  .brand .wm { font-family: "Urbanist", sans-serif; font-weight: 900; font-size: 20px; letter-spacing: -0.3px; }
  .brand .wm .r { color: #fff; }
  .brand .wm .g { color: #39ff14; }

  .eyebrow {
    margin-top: 34px;
    font-family: "Orbitron", sans-serif;
    font-weight: 700;
    letter-spacing: 0.42em;
    font-size: 15px;
    text-transform: uppercase;
    color: #2ee6c8;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 {
    font-family: "Orbitron", sans-serif;
    font-weight: 900;
    font-size: 82px;
    line-height: 1.02;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    margin: 14px 0 22px;
    background: linear-gradient(100deg, #ff2d95 0%, #b15cff 55%, #2ee6c8 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }

  .sub {
    font-size: 24px;
    line-height: 1.5;
    color: #f3eefb;
    max-width: 760px;
    margin-bottom: 34px;
  }
  .sub b { color: #2ee6c8; font-weight: 700; }

  .features { display: flex; gap: 14px; flex-wrap: wrap; }
  .feat {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 10px 18px;
    border: 1px solid rgba(160,140,220,0.28);
    border-radius: 999px;
    background: rgba(22,16,42,0.55);
    font-family: "Orbitron", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #d8d1ee;
  }
  .feat .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot-pink { background: #ff2d95; box-shadow: 0 0 8px rgba(255,45,149,0.7); }
  .dot-purple { background: #b15cff; box-shadow: 0 0 8px rgba(177,92,255,0.7); }
  .dot-teal { background: #2ee6c8; box-shadow: 0 0 8px rgba(46,230,200,0.7); }

  .footer {
    position: absolute;
    left: 64px; right: 64px; bottom: 40px;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 17px;
  }
  .footer .url { font-weight: 700; color: #f3eefb; }
  .footer .note { color: #9b91bd; }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid-overlay"></div>
  <div class="content">
    <span class="brand"><span class="mark"></span><span class="wm"><span class="r">Rave</span><span class="g">FAM</span></span></span>

    <p class="eyebrow">🎲 Roll the bass</p>
    <h1>Lineup<br>Explorer</h1>
    <p class="sub">Filter every festival lineup by <b>day &amp; genre</b>, then tap any artist to preview their sound across <b>5 streaming apps</b>.</p>

    <div class="features">
      <span class="feat"><span class="dot dot-pink"></span>Filter by day</span>
      <span class="feat"><span class="dot dot-purple"></span>Sort by vibe</span>
      <span class="feat"><span class="dot dot-teal"></span>Preview anywhere</span>
    </div>
  </div>

  <div class="footer">
    <span class="url">myravefam.com/lineup-explorer</span>
    <span class="note">Free · No account needed</span>
  </div>
</div>
</body>
</html>
