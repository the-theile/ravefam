<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Design 2 — Neon Stage</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #050509;
    font-family: 'Outfit', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #050509;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Dot grid */
  .dotgrid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 36px 36px;
    z-index: 0;
  }

  /* Glow blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
  }
  .blob-pink { width: 500px; height: 400px; background: #FF2D78; opacity: 0.09; top: -100px; left: -100px; }
  .blob-cyan { width: 400px; height: 350px; background: #00F5FF; opacity: 0.07; bottom: -80px; right: -80px; }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    padding: 0 80px;
  }

  /* Eyebrow */
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(57,255,20,0.07);
    border: 1px solid rgba(57,255,20,0.2);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 11px;
    font-weight: 700;
    color: #39FF14;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  /* Giant wordmark */
  .giant-wordmark {
    font-family: 'Urbanist', sans-serif;
    font-weight: 900;
    line-height: 0.9;
    margin-bottom: 28px;
  }

  .giant-wordmark .rave {
    display: block;
    font-size: 160px;
    color: #F0EEFF;
    letter-spacing: -6px;
    text-shadow: 0 0 60px rgba(255,255,255,0.1);
  }

  .giant-wordmark .fam {
    display: block;
    font-size: 160px;
    color: #39FF14;
    letter-spacing: -6px;
    text-shadow: 0 0 60px rgba(57,255,20,0.4), 0 0 120px rgba(57,255,20,0.15);
  }

  /* Divider */
  .divider {
    width: 480px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    margin: 0 auto 20px;
  }

  /* Tagline */
  .tagline {
    font-size: 20px;
    color: #6A6A8A;
    font-weight: 500;
    margin-bottom: 40px;
    letter-spacing: 0.3px;
  }

  /* Feature row */
  .features {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 100px;
    padding: 10px 28px;
    gap: 4px;
  }

  .feat {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 0 12px;
  }

  .feat-sep {
    width: 1px;
    height: 14px;
    background: rgba(255,255,255,0.1);
  }

  .feat-crews { color: #FF2D78; }
  .feat-festivals { color: #00F5FF; }
  .feat-archive { color: #BF00FF; }
  .feat-jams { color: #39FF14; }
  .feat-poll { color: #FFE600; }
  .feat-pins { color: #FF8C00; }

  /* URL */
  .url {
    position: absolute;
    bottom: 28px;
    right: 48px;
    font-size: 13px;
    color: rgba(106,106,138,0.6);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="dotgrid"></div>
  <div class="blob blob-pink"></div>
  <div class="blob blob-cyan"></div>

  <div class="content">
    <div class="eyebrow">Built for the dancefloor</div>

    <div class="giant-wordmark">
      <span class="rave">RAVE</span>
      <span class="fam">FAM</span>
    </div>

    <div class="divider"></div>
    <p class="tagline">Your Crew. Your Raves. Your Tribe.</p>

    <div class="features">
      <span class="feat feat-crews">Crews</span>
      <div class="feat-sep"></div>
      <span class="feat feat-festivals">Festivals</span>
      <div class="feat-sep"></div>
      <span class="feat feat-archive">The Archive</span>
      <div class="feat-sep"></div>
      <span class="feat feat-jams">FAM Jams</span>
      <div class="feat-sep"></div>
      <span class="feat feat-poll">FAM Poll</span>
      <div class="feat-sep"></div>
      <span class="feat feat-pins">FAM Pins</span>
    </div>
  </div>

  <div class="url">myravefam.com</div>
</div>
</body>
</html>
