<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Design 5 — Minimal Gradient</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #050509;
    font-family: 'Outfit', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    background: radial-gradient(ellipse at 50% 50%, #0A0015 0%, #050509 80%);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Glow blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
  }
  .blob-pink  { width: 500px; height: 400px; background: #FF2D78; opacity: 0.08; top: -120px; left: -100px; }
  .blob-cyan  { width: 400px; height: 380px; background: #00F5FF; opacity: 0.06; bottom: -100px; right: -80px; }
  .blob-green { width: 300px; height: 250px; background: #39FF14; opacity: 0.05; bottom: -60px; left: -60px; }

  /* Faint circle rings for depth */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.03);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
  }
  .ring-1 { width: 700px; height: 700px; }
  .ring-2 { width: 900px; height: 900px; }
  .ring-3 { width: 1100px; height: 1100px; }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  /* EQ logo */
  .eq-mark {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 4px;
    height: 36px;
    margin-bottom: 16px;
  }

  .eq-bar {
    width: 6px;
    border-radius: 4px;
    background: #39FF14;
    box-shadow: 0 0 10px rgba(57,255,20,0.5), 0 0 20px rgba(57,255,20,0.2);
  }

  .eq-bar:nth-child(1) { height: 22px; }
  .eq-bar:nth-child(2) { height: 36px; }
  .eq-bar:nth-child(3) { height: 28px; }

  /* Wordmark */
  .wordmark {
    font-family: 'Urbanist', sans-serif;
    font-weight: 900;
    font-size: 108px;
    letter-spacing: -4px;
    line-height: 1;
    margin-bottom: 20px;
  }

  .wordmark .rave {
    color: #F0EEFF;
  }

  .wordmark .fam {
    color: #39FF14;
    text-shadow: 0 0 40px rgba(57,255,20,0.35), 0 0 80px rgba(57,255,20,0.12);
  }

  /* Gradient separator */
  .separator {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, #FF2D78, #00F5FF);
    border-radius: 2px;
    margin: 0 auto 22px;
    box-shadow: 0 0 12px rgba(255,45,120,0.3);
  }

  /* Main tagline */
  .tagline-main {
    font-size: 23px;
    color: #F0EEFF;
    font-weight: 500;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
  }

  /* Sub tagline */
  .tagline-sub {
    font-size: 16px;
    color: #6A6A8A;
    margin-bottom: 44px;
    font-weight: 400;
  }

  /* Feature dots row */
  .features {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .feat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
  }

  .feat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .feat-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #6A6A8A;
  }

  .dot-pink   { background: #FF2D78; box-shadow: 0 0 8px rgba(255,45,120,0.6); }
  .dot-cyan   { background: #00F5FF; box-shadow: 0 0 8px rgba(0,245,255,0.6); }
  .dot-purple { background: #BF00FF; box-shadow: 0 0 8px rgba(191,0,255,0.6); }
  .dot-green  { background: #39FF14; box-shadow: 0 0 8px rgba(57,255,20,0.6); }
  .dot-yellow { background: #FFE600; box-shadow: 0 0 8px rgba(255,230,0,0.6); }
  .dot-orange { background: #FF8C00; box-shadow: 0 0 8px rgba(255,140,0,0.6); }

  /* URL */
  .url {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: rgba(106,106,138,0.5);
    font-weight: 500;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="blob blob-pink"></div>
  <div class="blob blob-cyan"></div>
  <div class="blob blob-green"></div>
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="content">
    <div class="eq-mark">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>

    <div class="wordmark">
      <span class="rave">Rave</span><span class="fam">FAM</span>
    </div>

    <div class="separator"></div>

    <p class="tagline-main">Your Crew. Your Raves. Your Tribe.</p>
    <p class="tagline-sub">Your crew deserves a real home base</p>

    <div class="features">
      <div class="feat-item">
        <div class="feat-dot dot-pink"></div>
        <span class="feat-label">Crews</span>
      </div>
      <div class="feat-item">
        <div class="feat-dot dot-cyan"></div>
        <span class="feat-label">Festivals</span>
      </div>
      <div class="feat-item">
        <div class="feat-dot dot-purple"></div>
        <span class="feat-label">Archive</span>
      </div>
      <div class="feat-item">
        <div class="feat-dot dot-green"></div>
        <span class="feat-label">Jams</span>
      </div>
      <div class="feat-item">
        <div class="feat-dot dot-yellow"></div>
        <span class="feat-label">Poll</span>
      </div>
      <div class="feat-item">
        <div class="feat-dot dot-orange"></div>
        <span class="feat-label">FAM Pins</span>
      </div>
    </div>
  </div>

  <div class="url">myravefam.com</div>
</div>
</body>
</html>
