<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Invite — Crew</title>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #050509;
    font-family: 'Outfit', sans-serif;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #050509;
    overflow: hidden;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(255,255,255,0.012) 3px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
  }
  .blob-pink { width: 460px; height: 380px; background: #FF2D78; opacity: 0.10; top: -120px; left: -100px; }
  .blob-purple { width: 420px; height: 380px; background: #BF00FF; opacity: 0.08; bottom: -140px; right: -100px; }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 44px 56px 36px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eq-mark {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 28px;
  }

  .eq-bar {
    width: 5px;
    border-radius: 3px;
    background: #FF2D78;
    box-shadow: 0 0 8px rgba(255,45,120,0.5);
  }

  .eq-bar:nth-child(1) { height: 18px; }
  .eq-bar:nth-child(2) { height: 28px; }
  .eq-bar:nth-child(3) { height: 22px; }

  .wordmark {
    font-family: 'Urbanist', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .wordmark span.rave { color: #F0EEFF; }
  .wordmark span.fam { color: #FF2D78; }

  .url {
    font-size: 15px;
    color: #6A6A8A;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .body {
    display: flex;
    flex: 1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 20px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,45,120,0.08);
    border: 1px solid rgba(255,45,120,0.3);
    border-radius: 100px;
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 700;
    color: #FF2D78;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .headline {
    font-family: 'Urbanist', sans-serif;
    font-weight: 900;
    line-height: 1.05;
  }

  .headline .line1 {
    display: block;
    font-size: 68px;
    color: #F0EEFF;
  }

  .headline .line2 {
    display: block;
    font-size: 68px;
    background: linear-gradient(90deg, #FF2D78 0%, #BF00FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 20px;
    color: #8585A5;
    font-weight: 500;
    max-width: 640px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="blob blob-pink"></div>
  <div class="blob blob-purple"></div>
  <div class="scanlines"></div>

  <div class="content">
    <div class="header">
      <div class="logo">
        <div class="eq-mark">
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
          <div class="eq-bar"></div>
        </div>
        <div class="wordmark"><span class="rave">Rave</span><span class="fam">FAM</span></div>
      </div>
      <div class="url">myravefam.com</div>
    </div>

    <div class="body">
      <div class="eyebrow">👥 Crew Invite</div>
      <h1 class="headline">
        <span class="line1">You're invited to</span>
        <span class="line2">the Crew</span>
      </h1>
      <p class="tagline">Tap to join — track festivals, share memories, and vibe together with your people.</p>
    </div>
  </div>
</div>
</body>
</html>
